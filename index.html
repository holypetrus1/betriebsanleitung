<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f4ed" />
    <meta name="description" content="Mendel11 – eine kleine Betriebsanleitung für Wohnung, Katzen und Smart Home." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mendel11" />
    <title>Mendel11</title>
    <script>
      try {
        document.documentElement.dataset.skin = localStorage.getItem('mendel11-skin') || 'classic';
      } catch (error) {
        document.documentElement.dataset.skin = 'classic';
      }
    </script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles-v2.css" />
    <link rel="stylesheet" href="styles-v3.css" />
    <link rel="stylesheet" href="styles-v4.css" />
    <link rel="stylesheet" href="styles-v5.css" />
    <link rel="stylesheet" href="styles-v6.css" />
  </head>
  <body>
    <a class="skip-link" href="#app">Zum Inhalt springen</a>

    <div class="app-shell">
      <header class="topbar">
        <button class="brand" type="button" data-route="start" aria-label="Zur Startseite">
          <span class="brand-mark" aria-hidden="true">M11</span>
          <span>
            <strong>Mendel11</strong>
            <small>Wohnen · Katzen · Technik</small>
          </span>
        </button>
        <button class="round-button" id="moreButton" type="button" aria-label="Weitere Seiten öffnen">
          <span aria-hidden="true">•••</span>
        </button>
      </header>

      <main id="app" tabindex="-1" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="Hauptnavigation">
        <button type="button" data-route="katzen" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5.5 9.2 4.2 4.8l4 2.1A8.3 8.3 0 0 1 12 6c1.4 0 2.7.3 3.8.9l4-2.1-1.3 4.4A7 7 0 0 1 19 12c0 4-3.1 7-7 7s-7-3-7-7c0-1 .2-1.9.5-2.8Z"/><path d="M9 13h.01M15 13h.01M10 16c1.3.8 2.7.8 4 0"/></svg>
          </span>
          <span>Katzen</span>
        </button>
        <button type="button" data-route="wohnung" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m3 11 9-7 9 7"/><path d="M5.5 10v9h13v-9M9.5 19v-5h5v5"/></svg>
          </span>
          <span>Wohnung</span>
        </button>
        <button type="button" data-route="hilfe" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.7 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1.2 1-1.2 1.7M12 17h.01"/></svg>
          </span>
          <span>Hilfe</span>
        </button>
        <button type="button" data-route="naehe" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2v3M9.8 5h4.4M10.7 7.2h2.6M12 7.2v3.1M9.2 10.3h5.6l-1 3.3h-3.6l-1-3.3ZM11 13.6 8.3 22M13 13.6l2.7 8.4M7 22h10"/><circle cx="12" cy="11.9" r=".8" class="icon-fill"/></svg>
          </span>
          <span>Orte</span>
        </button>
      </nav>
    </div>

    <dialog id="moreDialog" class="sheet-dialog">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Weitere Seiten</p>
          <h2>Mehr aus Mendel11</h2>
        </div>
        <button class="round-button" id="closeMore" type="button" aria-label="Menü schließen">×</button>
      </div>
      <div class="sheet-grid">
        <button type="button" data-route="start" class="sheet-link">
          <span aria-hidden="true">⌂</span>
          <strong>Start</strong>
          <small>Ankommen und Schnellzugriff</small>
        </button>
        <button type="button" data-route="kaffee" class="sheet-link">
          <span aria-hidden="true">☕</span>
          <strong>Kaffee</strong>
          <small>Bialetti oder Siebträger</small>
        </button>
        <button type="button" data-route="film" class="sheet-link">
          <span aria-hidden="true">▷</span>
          <strong>Film & Musik</strong>
          <small>Denon, Beamer, Streaming</small>
        </button>
        <button type="button" data-route="abreise" class="sheet-link">
          <span aria-hidden="true">↗</span>
          <strong>Abreise</strong>
          <small>Kurzer Abschluss-Check</small>
        </button>
      </div>
    </dialog>

    <script src="app.js" defer></script>
    <script src="app-v3.js" defer></script>
    <script src="app-v4.js" defer></script>
    <script src="app-v5.js" defer></script>
  </body>
</html>
